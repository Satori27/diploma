apiVersion: v1
kind: Service
metadata:
  name: checkout-service
  labels:
    app: checkout-service
spec:
  selector:
    app: checkout-service
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: outbox-service
  namespace: default
  labels:
    app: outbox-service
spec:
  selector:
    app: checkout-service
  ports:
    - name: metrics
      port: 9100       
      targetPort: 3001
