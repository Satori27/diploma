apiVersion: v1
kind: ServiceAccount
metadata:
  name: e2e-service
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: e2e-service
  namespace: default
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: e2e-service
  namespace: default
subjects:
- kind: ServiceAccount
  name: e2e-service
roleRef:
  kind: Role
  name: e2e-service
  apiGroup: rbac.authorization.k8s.io
